<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CogniStruct NCERT Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
            colors: {
              primary: {
                50:  '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              academic: {
                bg: '#f8fafc',
                paper: '#ffffff',
                text: '#334155',
                heading: '#0f172a',
              }
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        height: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        overscroll-behavior: none !important;
      }

      #root {
        height: 100%;
      }

      body {
        transition: background-color 0.3s, color 0.3s;
      }
      
      /* Dark Mode Base Styles handled by Tailwind 'dark:' classes mostly, 
         but we ensure scrolling is nice */
      html.dark body {
        background-color: #0f172a;
        color: #e2e8f0;
      }

      /* Reading Mode Overrides - Warm Sepia Tones */
      html.reading body {
        background-color: #f7f1e3;
        color: #4a3b2a;
      }
      
      html.reading .bg-white {
        background-color: #fdfbf7 !important;
        border-color: #e6dcc8 !important;
      }
      
      html.reading .bg-slate-50, 
      html.reading .bg-slate-100 {
        background-color: #efe8d5 !important;
        border-color: #e6dcc8 !important;
      }
      
      html.reading .text-slate-900,
      html.reading .text-slate-800,
      html.reading .text-slate-700 {
        color: #4a3b2a !important;
      }
      
      html.reading .text-slate-500,
      html.reading .text-slate-400 {
        color: #8c7b66 !important;
      }
      
      html.reading .border-slate-100,
      html.reading .border-slate-200 {
        border-color: #e6dcc8 !important;
      }

      /* Minimalist scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1?bundle",
    "remark-math": "https://esm.sh/remark-math@6.0.0?bundle",
    "remark-gfm": "https://esm.sh/remark-gfm@4.0.0?bundle",
    "rehype-katex": "https://esm.sh/rehype-katex@7.0.0?bundle"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
